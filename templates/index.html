<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Drill</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <section class="card hero">
      <h1>Smart Drill</h1>
      <p>中学生向け英語ドリル</p>
    </section>

    {% if error_message %}
      <section class="card">
        <div class="alert">
          {{ error_message }}
        </div>
      </section>
    {% endif %}

    <section class="card recommendation-card">
      <h2>🌟 今日のおすすめ</h2>
      <p>過去に間違えた問題を優先しつつ、今日やる問題をSmart Drillが選びます。</p>
      <form action="{{ url_for('start_today') }}" method="post" class="form compact-form">
        <label>子供</label>
        <select name="child">
          {% for child in children %}
            <option value="{{ child }}" {% if child == selected_child %}selected{% endif %}>{{ child }}</option>
          {% endfor %}
        </select>
        <button type="submit" class="primary big-button">今日のおすすめを始める</button>
      </form>
    </section>

    <section class="card">
      <h2>📖 単元を選んで練習</h2>
      <p>特定の学年・単元だけを練習したいときはこちら。</p>

      <form action="{{ url_for('start') }}" method="post" class="form">
        <label>子供</label>
        <select name="child">
          {% for child in children %}
            <option value="{{ child }}" {% if child == selected_child %}selected{% endif %}>{{ child }}</option>
          {% endfor %}
        </select>

        <label>学年</label>
        <select name="grade" id="grade-select">
          <option value="all" {% if selected_grade == 'all' %}selected{% endif %}>すべて</option>
          {% for grade in grades %}
            <option value="{{ grade }}" {% if grade == selected_grade %}selected{% endif %}>{{ grade }}</option>
          {% endfor %}
        </select>

        <label>単元</label>
        <select name="category" id="category-select" data-selected-category="{{ selected_category }}">
          <option value="all">すべて</option>
        </select>

        <button type="submit" class="primary">スタート</button>
      </form>
    </section>
  </main>

  <script>
    const gradeCategoryMap = {{ grade_category_map | tojson }};
    const gradeSelect = document.getElementById("grade-select");
    const categorySelect = document.getElementById("category-select");

    function updateCategoryOptions() {
      const grade = gradeSelect.value;
      const selectedCategory = categorySelect.dataset.selectedCategory || "all";
      const categories = gradeCategoryMap[grade] || [];

      categorySelect.innerHTML = "";

      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = "すべて";
      categorySelect.appendChild(allOption);

      categories.forEach(function(category) {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });

      const values = Array.from(categorySelect.options).map(function(option) {
        return option.value;
      });

      if (values.includes(selectedCategory)) {
        categorySelect.value = selectedCategory;
      } else {
        categorySelect.value = "all";
      }

      categorySelect.dataset.selectedCategory = categorySelect.value;
    }

    gradeSelect.addEventListener("change", function() {
      categorySelect.dataset.selectedCategory = "all";
      updateCategoryOptions();
    });

    updateCategoryOptions();
  </script>
</body>
</html>
